server:
  name: "jmeter-mcp"
  version: "0.9.0-beta.1"
  description: "JMeter MCP Server for test script generation, correlation analysis, and test execution"
  build:
    date: "2026-04-19"

general:
  enable_debug: False
  enable_logging: True

jmeter_log:
  max_description_length: 200
  max_request_length: 500
  max_response_length: 500
  max_stack_trace_lines: 50
  error_levels:
    - "ERROR"
    - "FATAL"

artifacts:
  artifacts_path: ""

jmx_editing:
  create_backup: true
  max_backup_count: 10
  validate_after_edit: true
  max_analysis_files: 10

har_jmx_comparison:
  schema_comparison_depth: 3

jmeter:
  jmeter_home: "/opt/jmeter/apache-jmeter-5.6.3"
  jmeter_bin_path: "/opt/jmeter/apache-jmeter-5.6.3/bin"
  jmeter_start_exe: "jmeter"
  jmeter_stop_exe: "stoptest.sh"

test_specs:
  web_flows_path: "test-specs/web-flows"
  api_flows_path: "test-specs/api-flows"
  examples_path: "test-specs/examples"

browser:
  browser_type: "chrome"
  headless_mode: True
  window_size: "1920,1080"
  implicit_wait: 10
  page_load_timeout: 60
  think_time: 5000

network_capture:
  capture_api_requests: True          # Always true – critical for JMeter
  capture_static_assets: False        # CSS, JS, PNG, JPG, etc.
  capture_fonts: False                # WOFF, WOFF2, TTF, etc.
  capture_video_streams: False        # Exclude HLS/video streaming files
  capture_third_party: True           # Google Fonts, CDN, Ads
  capture_cookies: True               # Always true – critical for JMeter
  capture_domain: ""                  # Domain to capture network traffic from (e.g., example.com). Leave empty to capture all domains.
  
  # Exclusion patterns for APM, analytics, and other non-essential traffic
  # These domains will be excluded from network capture AND correlation analysis
  exclude_domains:
    # APM / Monitoring
    - datadoghq.com
    - newrelic.com
    - appdynamics.com
    - dynatrace.com
    - splunk.com
    - elastic.co
    - sumologic.com
    - lightstep.io
    
    # Cookies / Consent Management
    - cookieconsent.com
    - geolocation.onetrust.com
    - consent.trustarc.com
    - cdn.cookielaw.org

    # Privacy / Consent Management
    - privacy-center.org
    - privacyportal-eu.onetrust.com

    # Analytics / Tracking
    - google-analytics.com
    - googletagmanager.com
    - segment.io
    - segment.com
    - mixpanel.com
    - amplitude.com
    - heap.io
    - hotjar.com
    - fullstory.com
    - clarity.ms
    - mouseflow.com
    - crazyegg.com
    - data.pendo.io
    - pendo-static-*.storage.googleapis.com
    
    # Advertising / Pixels
    - doubleclick.net
    - googlesyndication.com
    - googletagservices.com
    - adtrafficquality.google
    - facebook.net
    - connect.facebook.com
    - ads.linkedin.com
    - ads.twitter.com
    - bing.com/bat
    
    # Advertising / Ad Networks (Amazon-specific)
    - amazon-adsystem.com
    - amazon.partners.tremorhub.com
    
    # Third-Party Ad Networks / Exchanges
    - ib.adnxs.com
    - smartadserver.com
    - 360yield.com
    - casalemedia.com
    - pbs.yahoo.com
    - pixel.rubiconproject.com
    - odr.mookie1.com
    - bs.serving-sys.com
    - c1.adform.net
    - cookie-matching.mediarithmics.com
    - csync.loopme.me
    - ssum-sec.casalemedia.com
    - image2.pubmatic.com
    - crb.kargo.com
    - lciapi.ninthdecimal.com
    - loadus.exelator.com
    - us-u.openx.net
    - ads.yieldmo.com
    - sync.taboola.com
    - ih.adscale.de
    - x.bidswitch.net
    - dmxleo.com
    - s0.2mdn.net
    
    # Content / Media Platforms
    - capi.connatix.com
    - geo.ads.audio.thisisdax.com
    - www.imdb.com
    - ads.samba.tv
    
    # Data / Identity Management
    - dpm.demdex.net
    
    # Security / Tokens
    - token.awswaf.com
    
    # Social Media
    - www.facebook.com
    
    # Error Tracking
    - sentry.io
    - bugsnag.com
    - rollbar.com
    - raygun.com

  # URL path exclusion patterns (supports wildcards via fnmatch glob-style matching)
  # Matched against the URL path only (no query string). Case-insensitive.
  # Wildcards: * matches any characters, ? matches a single character
  exclude_paths:
    # Real-Time / WebSocket Negotiation
    - "*/SignalR/negotiate"
    - "*/SignalRHub/negotiate"
    - "*/signalr/start"
    - "*/signalr/poll"
    - "*/signalr/connect"

    # Health Checks / Readiness Probes
    - "*/health"
    - "*/healthz"
    - "*/ready"
    - "*/readiness"
    - "*/liveness"

    # Diagnostics / Debug Endpoints
    - "*/diagnostics"
    - "*/ping"
    - "*/status"

    # Browser-Only / UI Notification Channels
    - "*/push/negotiate"
    - "*/push/connect"

    # Service Workers / Manifests
    - "*/service-worker.js"
    - "*/sw.js"
    - "*/manifest.json"
    - "*/browserconfig.xml"

    # Source Maps (not relevant for load testing)
    - "*.map"
