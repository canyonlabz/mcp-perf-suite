# JMeter Properties Overrides for Docker
#
# Add JMeter property overrides here. These are appended to jmeter.properties
# at container startup by the entrypoint script.
#
# Common examples:
#   CookieManager.save.cookies=true
#   httpclient4.retrycount=1
#   httpsampler.max_redirects=10
#
# Note: For the CookieManager.save.cookies setting, you can also use the
# JMETER_COOKIE_SAVE=true environment variable instead of adding it here.
JMETER_COOKIE_SAVE=true