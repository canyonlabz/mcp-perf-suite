# Monitoring Agent - Per-Agent Configuration (PBI 3.9.2)
# ------------------------------------------------------
# **This is the committed, public-facing reference file.** See
# `agent-framework/AGENTS.md` -> "Per-agent `config.yaml` schema" for
# the full schema reference and the candidate-resolution convention.
#
# Consumed by `agents/monitoring-agent/agent.py::build_monitoring_agent()`
# at startup.

# =============================================================================
# 1. LLM provider override
# =============================================================================
# Leaving this block commented out means the monitoring-agent uses
# `agents.yaml -> default_llm_provider`. The monitoring-agent's work is
# largely mechanical (API queries with structured parameters), so a
# deterministic temperature is appropriate.
#
# llm_provider:
#   provider: openai
#   openai_model: gpt-4o-mini
#   temperature: 0.1

# =============================================================================
# 2. MCP namespace allowlist (gateway-mcp tools)
# =============================================================================
# The monitoring-agent accesses one namespace through the gateway-mcp:
#
# - `datadog` — Host metrics, Kubernetes metrics, APM traces, and
#   application log queries. Full tool list includes:
#   datadog_get_host_metrics, datadog_get_kubernetes_metrics,
#   datadog_get_apm_traces, datadog_query_logs,
#   datadog_get_custom_metrics, etc.
#
# Per V2 Section 13.1 and AGENTS.md Convention 5.
mcp_tools:
  allowed_namespaces:
    - datadog

# =============================================================================
# 3. Retries
# =============================================================================
# Per `mcp-error-handling` rule: Datadog MCP is API-based, retry up to
# 3 times on transient failures with 5-10s between retries.
retries: 3

# =============================================================================
# 4. Timeouts
# =============================================================================
# Datadog API queries (especially large timeseries pulls) can take
# longer than simple REST calls. 90 seconds is generous for paginated
# metric queries.
timeout_seconds: 90

# =============================================================================
# 5. A2A discovery metadata
# =============================================================================
a2a:
  display_name: "PerfPilot Monitoring Agent"
  description: "Per-test-run Datadog metric, trace, and log extraction for infrastructure observability. Currently in development."
  tags:
    - monitoring
    - datadog
    - metrics
    - apm
    - logs
