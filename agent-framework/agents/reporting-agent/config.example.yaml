# Reporting Agent - Per-Agent Configuration (PBI 3.9.4)
# -----------------------------------------------------
# See `agent-framework/AGENTS.md` -> "Per-agent `config.yaml` schema"
# for the full schema reference and the candidate-resolution convention.

# =============================================================================
# 1. LLM provider override
# =============================================================================
# The reporting-agent drives HITL revision loops and produces
# human-readable report text. A slightly higher temperature (0.3)
# allows for more natural prose while staying deterministic enough
# for structured sections.
#
# llm_provider:
#   provider: openai
#   openai_model: gpt-4o-mini
#   temperature: 0.3

# =============================================================================
# 2. MCP namespace allowlist (gateway-mcp tools)
# =============================================================================
# - `perfreport` — chart generation, report creation, AI-driven
#   revision, template management.
# - `confluence` — page creation, content update, image attachment,
#   space/page navigation.
mcp_tools:
  allowed_namespaces:
    - perfreport
    - confluence

# =============================================================================
# 3. Retries
# =============================================================================
# PerfReport MCP is code-based (no retries). Confluence MCP is
# API-based (retry up to 3 times per `mcp-error-handling`).
retries: 3

# =============================================================================
# 4. Timeouts
# =============================================================================
# Chart generation and Confluence publishing can take time.
timeout_seconds: 120

# =============================================================================
# 5. A2A discovery metadata
# =============================================================================
a2a:
  display_name: "PerfPilot Reporting Agent"
  description: "Chart generation, Markdown report assembly, multi-round HITL revision, and Confluence publishing. Currently in development."
  tags:
    - reporting
    - charts
    - confluence
    - hitl
