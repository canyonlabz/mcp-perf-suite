# Execution Agent - Per-Agent Configuration (PBI 3.8.1)
# ------------------------------------------------------
# **This is the committed, public-facing reference file.** Mirrors the
# same `config.yaml` / `config.example.yaml` split that the MCP servers
# under this repo already use (and that `agent-framework/config/agents.yaml`
# uses for the global-fallback LLM block). The agent factory in
# `agents/execution-agent/agent.py` (and the framework-level loader in
# `utils/base_agent.py`) walk the candidates in priority order:
#
#   1. `agents/execution-agent/config.yaml`         (gitignored, operator override)
#   2. `agents/execution-agent/config.example.yaml` (this file - committed default)
#
# Operators / engineers copy this file to `config.yaml` and customize
# without polluting git. The example stays unmodified in the branch so
# smoke tests and fresh clones always have a working default.
#
# Consumed by `agents/execution-agent/agent.py::build_execution_agent()` at
# startup. See `agent-framework/AGENTS.md` -> "Per-agent `config.yaml`
# schema" for the full schema reference and the candidate-resolution
# convention.
#
# Sections:
#   1. llm_provider     - per-agent LLM override (commented out -> use
#                         the global default from
#                         `agent-framework/config/agents.yaml`)
#   2. mcp_tools        - namespace allowlist (`blazemeter`, `jmeter`) -
#                         filtered by `utils/mcp_client.py` (PBI 3.8.2)
#                         before tools are exposed to the agent
#   3. retries          - call-level retry budget for transient MCP failures
#   4. timeout_seconds  - per-tool soft timeout for short MCP calls
#                         (start_test / status checks); long-running
#                         polling is governed by `wait_for_completion`'s
#                         own `timeout_seconds` kwarg, not this block
#   5. a2a              - A2A discovery metadata override

# =============================================================================
# 1. LLM provider override
# =============================================================================
# Leaving this block commented out means the execution-agent uses
# `agents.yaml -> default_llm_provider` (in `agents.example.yaml` today
# that is `openai / gpt-4o-mini / temperature 0.2`). Operators can
# uncomment + customize without code changes.
#
# For execution-agent, deterministic output (`temperature: 0.1` or lower)
# is appropriate: the agent's job is recipe execution, not creative
# generation. The orchestrator handles the chatty surfaces.
#
# Example (mirrors V2 doc Section 11.2):
#
# llm_provider:
#   provider: openai
#   openai_model: gpt-4o-mini
#   temperature: 0.1

# =============================================================================
# 2. MCP namespace allowlist
# =============================================================================
# Per V2 Section 13.1, the execution-agent gets `blazemeter_*` for test
# execution + artifact pulls, plus `jmeter_*` for the Step-6 log analysis
# tool (`jmeter_analyze_jmeter_log`). The full BlazeMeter MCP tool list
# the agent uses today:
#
#   blazemeter_start_test
#   blazemeter_check_test_status
#   blazemeter_get_run_results
#   blazemeter_get_artifacts_path
#   blazemeter_process_session_artifacts
#   blazemeter_get_public_report
#   blazemeter_get_aggregate_report
#
# `utils/mcp_client.py` (PBI 3.8.2) filters the gateway-mcp tool catalog
# through this allowlist before exposing tools to the agent. Anything
# outside these two namespaces is unreachable by design.
mcp_tools:
  allowed_namespaces:
    - blazemeter
    - jmeter

# =============================================================================
# 3. Retries
# =============================================================================
# Retry budget for transient MCP failures. Per the project's
# `mcp-error-handling` rule, API-based MCP tools retry up to 3 times on
# transient failures (network errors, timeouts, 5xx, HTTP 429) with
# 5-10 seconds between attempts. Code-based MCP tools
# (e.g. `jmeter_analyze_jmeter_log`) never retry on failure.
retries: 3

# =============================================================================
# 4. Timeouts
# =============================================================================
# Soft timeout for short MCP calls the agent makes (start_test,
# check_test_status, get_run_results, get_artifacts_path, the various
# get_*_report calls). 60 seconds is generous for these synchronous
# API round-trips.
#
# Long-running operations are NOT governed by this timeout:
#   - `wait_for_completion(run_id, *, timeout_seconds=300.0)` has its own
#     timeout kwarg that the caller controls per-call (300s default).
#   - `process_session_artifacts` can take several minutes for large
#     multi-session runs; the MCP itself manages its internal timeout.
timeout_seconds: 60

# =============================================================================
# 5. A2A discovery metadata
# =============================================================================
# Overrides for the `agent_card.json` fields used by external A2A
# clients. When absent, sensible defaults are derived from the agent's
# folder name + agent_card.json contents.
a2a:
  display_name: "PerfPilot Execution Agent"
  description: "Performance-test execution and post-test artifact extraction (BlazeMeter today; vendor-agnostic agent-tool names for future multi-vendor support)."
  tags:
    - execution
    - blazemeter
    - extraction
