# Agent Framework — Global Configuration
# ----------------------------------------
# Copy this file to `agents.yaml` and tune for your environment.
# `agents.yaml` is gitignored. If `agents.yaml` is absent, the framework
# falls back to this `.example` file (mirrors the PerfMemory taxonomy
# fallback pattern).
#
# Two sections:
#   1. default_llm_provider — global fallback used by any agent whose own
#      `agents/<name>/config.yaml` does not declare an `llm_provider` block.
#   2. agents — per-agent enable/disable flags. Disabled agents are skipped
#      by the orchestrator and return 404 on their A2A `agent_card.json`.

# =============================================================================
# Default LLM Provider (global fallback)
# =============================================================================
# Per-agent overrides live in each agent's `config.yaml` under `llm_provider:`.
# Credentials (api keys, endpoints) are NEVER stored here — they come from
# `.env` and are merged in at runtime by `utils/llm_provider.py`.
#
# `provider` must be one of: openai | azure_openai | ollama
default_llm_provider:
  provider: openai
  openai_model: gpt-4o-mini
  # Set lower (≈0.1) for deterministic agents (analysis, reporting),
  # higher (≈0.4) for creative tasks. Per-agent overrides win.
  temperature: 0.2

  # TLS verification mode for outbound HTTPS calls to the LLM provider.
  # Mirrors the convention used by blazemeter-mcp / datadog-mcp / confluence-mcp:
  #   ca_bundle - use a CA bundle from REQUESTS_CA_BUNDLE / SSL_CERT_FILE env
  #               vars (typical for corporate networks doing TLS inspection,
  #               e.g. Norton 360, Zscaler, BlueCoat). Falls back to the
  #               default trust store if no bundle is set.
  #   system    - use Python's default trust store (certifi).
  #   disabled  - skip TLS verification entirely. NOT recommended for prod;
  #               useful only for transient lab debugging.
  ssl_verification: ca_bundle

  # Uncomment to switch the global default to Azure OpenAI:
  # provider: azure_openai
  # azure_deployment: gpt-4o
  # temperature: 0.2

  # Uncomment to switch the global default to a local Ollama instance:
  # provider: ollama
  # ollama_model: llama3.1
  # temperature: 0.2

# =============================================================================
# Agent enable/disable
# =============================================================================
# `enabled: false` agents:
#   - Are NOT instantiated at startup.
#   - Are NOT returned by the A2A discovery endpoints.
#   - Cause `404` on their `/agents/<name>/agent_card.json` URL.
#   - Are skipped (with a warning) if the orchestrator tries to delegate to them.
#
# Defaults below match the Epic 3 sequencing in
# `docs/plans/AG2-Framework-and-Architecture-V2.md` §11.3:
#   - script-agent is disabled until the Playwright MCP container ships
#     (Feature 3.10 / 3.12). Operators can flip it on once Playwright MCP
#     is reachable from the agent-framework container.
#   - notifications-agent stays a stub through all of Epic 3 but is enabled
#     so its A2A card is discoverable.
agents:
  orchestrator:        { enabled: true }
  execution-agent:     { enabled: true }
  script-agent:        { enabled: false }
  monitoring-agent:    { enabled: true }
  analysis-agent:      { enabled: true }
  reporting-agent:     { enabled: true }
  notifications-agent: { enabled: true }
