server:
  name: "perfpilot-hub"
  transport: "stdio"
  host: "0.0.0.0"
  port: 8000

servers:
  # Core servers (always enabled)
  jmeter: true
  blazemeter: true
  datadog: true
  perfanalysis: true
  perfreport: true
  confluence: true
  perfmemory: true
  # Local-only servers
  msteams: true
  sharepoint: true
